server:
  port: 8080

spring:
  application:
    name: GoBuy
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shop_v3?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.gobuy.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: GoBuySecretKeyForJwtTokenGenerationMustBe256BitsLong!!
  expiration: 86400000
  admin-expiration: 7200000

logging:
  level:
    com.example.gobuy: debug
